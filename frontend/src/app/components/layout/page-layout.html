<div class="page-container">
  <nav class="sidebar-nav" [class.recolhida]="menuRecolhido()">
    <div class="navbar-brand">
      <img src="/orbis-logo.png" alt="Orbis logo" class="logo-navbar" />
      <span>Orbis</span>
    </div>

    <button (click)="toggleMenuRecolhido()" class="btn-toggle" type="button" aria-label="Alternar menu">
      <span class="toggle-arrow" aria-hidden="true">❮</span>
      <span class="toggle-bars" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
      </span>
    </button>

    <div class="navbar-menu" [class.ativo]="menuAberto()">
      <a (click)="irParaDashboard()" class="menu-item" [class.ativo]="isPaginaAtiva('dashboard')">
        <img src="/assets/menu/dashboard.png" alt="" class="menu-icon" aria-hidden="true" />
        <span class="label">Dashboard</span>
      </a>
      <a *ngIf="podeVerProdutos()" (click)="irParaProdutos()" class="menu-item" [class.ativo]="isPaginaAtiva('produtos')">
        <img src="/assets/menu/produtos.png" alt="" class="menu-icon" aria-hidden="true" />
        <span class="label">Produtos</span>
      </a>
      <a *ngIf="podeVerCategorias()" (click)="irParaCategorias()" class="menu-item" [class.ativo]="isPaginaAtiva('categorias')">
        <img src="/assets/menu/sistema.png" alt="" class="menu-icon" aria-hidden="true" />
        <span class="label">Categorias</span>
      </a>
      <a *ngIf="podeVerFinanceiro()" (click)="irParaFinanceiro()" class="menu-item" [class.ativo]="isPaginaAtiva('financeiro')">
        <img src="/assets/menu/financeiro.png" alt="" class="menu-icon" aria-hidden="true" />
        <span class="label">Financeiro</span>
      </a>
      <a *ngIf="podeVerMovimentacoes()" (click)="irParaMovimentacoes()" class="menu-item" [class.ativo]="isPaginaAtiva('movimentacoes')">
        <img src="/assets/menu/estoque.png" alt="" class="menu-icon" aria-hidden="true" />
        <span class="label">Movimentações</span>
      </a>
      <a *ngIf="podeVerClientes()" (click)="irParaClientes()" class="menu-item" [class.ativo]="isPaginaAtiva('clientes')">
        <img src="/assets/menu/fornecedores.png" alt="" class="menu-icon" aria-hidden="true" />
        <span class="label">Clientes</span>
      </a>
      <a *ngIf="podeVerPedidos()" (click)="irParaPedidos()" class="menu-item" [class.ativo]="isPaginaAtiva('pedidos')">
        <img src="/assets/menu/fornecedores.png" alt="" class="menu-icon" aria-hidden="true" />
        <span class="label">Pedidos</span>
      </a>
      <a *ngIf="podeVerUsuarios()" (click)="irParaUsuarios()" class="menu-item" [class.ativo]="isPaginaAtiva('usuarios')">
        <img src="/assets/menu/usuarios.png" alt="" class="menu-icon" aria-hidden="true" />
        <span class="label">Usuários</span>
      </a>
    </div>

    <div class="navbar-user">
      <button class="user-trigger" type="button" (click)="toggleMenuUsuario()" [attr.aria-expanded]="menuUsuarioAberto()">
        <span class="user-avatar">{{ getNomeUsuario().charAt(0) }}</span>
        <span class="user-info">
          <strong class="user-name">{{ getNomeUsuario() }}</strong>
          <small class="user-role">{{ getPerfilUsuario() }}</small>
        </span>
      </button>

      <div class="user-menu" *ngIf="menuUsuarioAberto()">
        <button (click)="logout()" class="btn-logout" type="button">Encerrar sessão</button>
      </div>
    </div>
  </nav>

  <div class="page-content">
    <ng-content />
  </div>
</div>
