<div class="page-container">
  <nav class="navbar" [class.recolhida]="menuRecolhido()">
    <div class="navbar-brand">
      <img src="/orbis-logo.svg" alt="Orbis logo" class="logo-navbar" />
      <span>Orbis</span>
    </div>

    <button (click)="toggleMenuRecolhido()" class="btn-toggle" type="button" aria-label="Alternar menu">
      <span class="toggle-arrow" aria-hidden="true">❮</span>
      <span class="toggle-bars" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
      </span>
    </button>

    <div class="navbar-menu" [class.ativo]="menuAberto()">
      <a (click)="irParaDashboard()" class="menu-item" [class.ativo]="isPaginaAtiva('dashboard')">
        <span class="label">Dashboard</span>
      </a>
      <a *ngIf="podeVerProdutos()" (click)="irParaProdutos()" class="menu-item" [class.ativo]="isPaginaAtiva('produtos')">
        <span class="label">Produtos</span>
      </a>
      <a *ngIf="podeVerFinanceiro()" (click)="irParaFinanceiro()" class="menu-item" [class.ativo]="isPaginaAtiva('financeiro')">
        <span class="label">Financeiro</span>
      </a>
      <a *ngIf="podeVerMovimentacoes()" (click)="irParaMovimentacoes()" class="menu-item" [class.ativo]="isPaginaAtiva('movimentacoes')">
        <span class="label">Movimentações</span>
      </a>
      <a *ngIf="podeVerClientes()" (click)="irParaClientes()" class="menu-item" [class.ativo]="isPaginaAtiva('clientes')">
        <span class="label">Clientes</span>
      </a>
      <a *ngIf="podeVerPedidos()" (click)="irParaPedidos()" class="menu-item" [class.ativo]="isPaginaAtiva('pedidos')">
        <span class="label">Pedidos</span>
      </a>
      <a *ngIf="podeVerUsuarios()" (click)="irParaUsuarios()" class="menu-item" [class.ativo]="isPaginaAtiva('usuarios')">
        <span class="label">Usuários</span>
      </a>
    </div>

    <div class="navbar-user">
      <button (click)="logout()" class="btn-logout">Sair</button>
    </div>
  </nav>

  <div class="page-content">
    <ng-content />
  </div>
</div>
