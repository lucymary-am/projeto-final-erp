<app-page-layout currentPage="financeiro">
    <div class="page-header">
      <h1>Financeiro</h1>
    </div>

    <div class="page-card">
      <div *ngIf="loading()" class="loading-message">Carregando...</div>
      <div *ngIf="!loading() && errorMessage()" class="error-message">{{ errorMessage() }}</div>

      <table class="financeiro-table" *ngIf="!loading()">
        <thead>
          <tr>
            <th>Produto</th>
            <th>Valor unitário</th>
            <th>Quantidade total</th>
            <th>Valor total</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let l of linhasFinanceiro">
            <td>{{ l.nome }}</td>
            <td>{{ formatValorUnitario(l.valorUnitario) }}</td>
            <td>{{ l.quantidade }}</td>
            <td>{{ formatValorTotal(l.valorTotal) }}</td>
          </tr>
        </tbody>
        <tfoot>
          <tr>
            <td colspan="3"><strong>Total geral</strong></td>
            <td><strong>{{ formatValorTotal(totalGeral) }}</strong></td>
          </tr>
        </tfoot>
      </table>
    </div>
</app-page-layout>
